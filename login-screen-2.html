<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warewolf - Login Screen 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@400&family=Noto+Serif+Thai:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="figma-export.css" />
</head>
<body>
  <main class="screen login-screen" data-node-id="877:390" data-name="Login / screen 2">
    <section class="cover-hero" data-node-id="877:391">
      <div class="cover-image" data-node-id="877:392">
        <img src="assets/877-393.png" alt="Werewolf cover" data-node-id="877:393" />
      </div>
      <div class="cover-fade" data-node-id="877:394"></div>
      <div class="cover-title-area" data-node-id="877:395">
        <h1 class="game-title" data-node-id="877:396">WAREWOLF</h1>
        <p class="game-tagline" data-node-id="877:397">The pack hunts. The village sleeps.</p>
      </div>
    </section>

    <section class="login-content" data-node-id="877:398">
      <div class="login-deco" data-node-id="877:399">
        <div class="login-deco-line" data-node-id="877:400"></div>
        <div class="login-deco-diamond" data-node-id="877:401"></div>

      <section class="input-card" data-node-id="877:403">

          <span data-node-id="877:406">····</span>
        </div>
        <p class="input-hint" data-node-id="877:407">Enter the 4-digit code from the host</p>
      </section>

      <div class="action-spacer" data-node-id="877:408"></div>

      <div class="action-area" data-node-id="877:409">
        <button class="join-btn" data-node-id="877:410">Join Room</button>
        <button class="create-btn" data-node-id="877:411">Create New Room</button>
      </div>
    </section>
  </main>

</html>
