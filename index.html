<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warewolf - Role Reveal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="screen">
    <div class="container">

      <!-- Top section (145:34) -->
      <div class="top-section">

        <!-- Inner section (145:35): title + card + name, gap-18px, px-24 -->
        <div class="inner-section">

          <!-- Reveal title (145:36) -->
          <div class="reveal-title">
            <p>Your Role</p>
            <p>Has Been Revealed</p>
          </div>

          <!-- Role card (145:37) -->
          <div class="role-card">
            <div class="role-card-inner">
              <img
                class="role-image"
                src="https://www.figma.com/api/mcp/asset/6006c809-e496-4842-81bb-de288abd6b05"
                alt="Werewolf"
              />
            </div>
          </div>

          <!-- Role name container (145:39) — 285.734 × 83px -->
          <div class="role-name-container">

            <!-- Top deco bar (145:40) -->
            <div class="deco-top-bar">
              <div class="deco-left-line"></div>
              <div class="deco-diamond-wrapper">
                <div class="deco-diamond"></div>
              </div>
              <div class="deco-right-line"></div>
            </div>

            <!-- Name content (145:44): starts at top 15px -->
            <div class="role-heading-area">
              <div class="role-title-wrapper">
                <h1 class="role-title">WEREWOLF</h1>
              </div>
              <div class="role-subtitle-wrapper">
                <p class="role-subtitle">You are one of the wolves. Hunt by night — and hide in plain sight by day.</p>
              </div>
            </div>

            <!-- Bottom deco line (145:49): top 82px -->
            <div class="deco-bottom-line">
              <div class="deco-bottom-inner"></div>
            </div>

          </div>
        </div>

        <!-- Info card (145:51) -->
        <div class="info-card">

          <!-- Ability row (145:52) -->
          <div class="info-row">
            <div class="icon-btn">
              <div class="icon-inner icon-inner--ability">
                <img
                  class="icon-img"
                  src="assets/icon-ability.svg"
                  alt="Ability icon"
                />
              </div>
            </div>
            <div class="info-text">
              <p class="info-label">Night Hunt</p>
              <p class="info-desc">Each night, secretly vote with your pack to eliminate one villager.</p>
            </div>
          </div>

          <!-- Win Condition row (145:57) -->
          <div class="info-row">
            <div class="icon-btn">
              <div class="icon-inner icon-inner--win">
                <img
                  class="icon-img"
                  src="assets/icon-win.svg"
                  alt="Win condition icon"
                />
              </div>
            </div>
            <div class="info-text">
              <p class="info-label">Victory</p>
              <p class="info-desc">Wolves win when they equal or outnumber the remaining villagers.</p>
            </div>
          </div>

        </div>
      </div>

      <!-- Start button (145:62) -->
      <button class="start-btn">STart</button>

    </div>
  </div>
</body>
</html>
